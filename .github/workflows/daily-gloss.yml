name: CS Glossary Update

on:
  schedule:
    - cron: '0 6,21 * * *'
  workflow_dispatch:

jobs:
  update-glossary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js (optional, to silence warning)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run glossary collector
        run: python scripts/Glossary.py

      - name: Configure Git
        run: |
          git config --local user.email "jeffin.issac2203@gmail.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push changes
        run: |
          git add public/CS_Glossary.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: glossary update - $(date +'%Y-%m-%d %H:%M')"
            git push
          fi