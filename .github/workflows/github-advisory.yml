name: GitHub Advisory Collector

on:
  schedule:
    # Runs daily at 07:00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  collect-advisories:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run GitHub Advisory collector
        env:
          # GITHUB_TOKEN is automatically provided by Actions
          # It has read:security_advisories scope by default
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/GitHubAdvisory.py

      - name: Configure Git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push changes
        run: |
          git add public/CaseStudies.json
          if git diff --staged --quiet; then
            echo "No new advisories to commit"
          else
            git commit -m "sync: github advisory update - $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
