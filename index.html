<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevDigest — CS Glossary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-glass: rgba(30, 41, 59, 0.6);
            --bg-glass-hover: rgba(51, 65, 85, 0.8);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-primary: #8b5cf6;
            --accent-glossary: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background:
                radial-gradient(at 40% 20%, hsla(280, 70%, 20%, 0.8) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(160, 70%, 15%, 0.6) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(220, 60%, 15%, 0.5) 0px, transparent 50%);
        }

        /* NAVBAR */
        nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 0 2rem;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--accent-glossary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .nav-count {
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            padding: 6px 14px;
            border-radius: 20px;
        }
        .nav-count span { color: var(--accent-glossary); font-weight: 600; }

        /* CONTAINER */
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }

        header { text-align: center; margin-bottom: 40px; }
        header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        header p { color: var(--text-secondary); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .live-indicator { width: 8px; height: 8px; background-color: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }

        /* FILTERS */
        .filters {
            background: var(--bg-glass); backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            padding: 20px; border-radius: 16px; margin-bottom: 30px;
            display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px;
        }
        .filter-group label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        .filter-group input, .filter-group select {
            width: 100%; padding: 10px 14px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            color: var(--text-primary); font-family: inherit; font-size: 0.95rem;
        }
        .filter-group input:focus, .filter-group select:focus { outline: none; border-color: var(--accent-glossary); }
        .filter-group input::placeholder { color: var(--text-secondary); }

        /* STATS */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 35px; }
        .stat-card {
            background: var(--bg-glass); border: 1px solid var(--border-glass);
            padding: 18px; border-radius: 12px; border-left: 3px solid var(--accent-glossary);
        }
        .stat-card .number { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--accent-glossary); }
        .stat-card .label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px; }

        /* GLOSSARY GRID */
        .glossary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 25px;
        }

        .glossary-card {
            background: var(--bg-glass); backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 12px; padding: 25px;
            display: flex; flex-direction: column; position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            border-top: 3px solid var(--accent-glossary);
            animation: fadeIn 0.4s ease-out forwards;
        }
        .glossary-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); background: var(--bg-glass-hover); }

        .glossary-cat {
            display: inline-block; width: fit-content;
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--accent-glossary); background: rgba(16, 185, 129, 0.1);
            padding: 4px 10px; border-radius: 20px; margin-bottom: 15px; font-weight: 600;
        }
        .glossary-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; margin-bottom: 10px; color: #fff; }
        .glossary-def {
            font-size: 0.9rem; line-height: 1.65; color: var(--text-secondary);
            flex-grow: 1; margin-bottom: 18px;
        }
        .glossary-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .glossary-link {
            font-size: 0.8rem; color: var(--text-secondary);
            text-decoration: none; display: flex; align-items: center; gap: 5px;
            transition: color 0.2s;
        }
        .glossary-link:hover { color: var(--accent-glossary); }
        .glossary-date { font-size: 0.75rem; color: rgba(148,163,184,0.5); }

        /* EMPTY STATE */
        .empty-state {
            grid-column: 1 / -1; text-align: center; padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 15px; }
        .empty-state p { font-size: 1rem; }

        footer { text-align: center; margin-top: 50px; color: var(--text-secondary); font-size: 0.85rem; opacity: 0.7; padding-bottom: 40px; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); } 70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .glossary-grid { grid-template-columns: 1fr; }
            .filters { grid-template-columns: 1fr; }
            nav { padding: 0 1rem; }
            .nav-brand { font-size: 1.4rem; }
            header h1 { font-size: 1.9rem; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <nav>
        <div class="nav-brand">DevDigest</div>
        <div class="nav-count"><span id="visibleCount">0</span> terms</div>
    </nav>

    <div class="container">
        <header>
            <h1>CS Glossary</h1>
            <p><span class="live-indicator"></span> Updated daily via GitHub Actions</p>
        </header>

        <div class="filters">
            <div class="filter-group">
                <label>Search</label>
                <input type="text" id="searchFilter" placeholder="Search topics or definitions..." oninput="filterGlossary()">
            </div>
            <div class="filter-group">
                <label>Category</label>
                <select id="categoryFilter" onchange="filterGlossary()">
                    <option value="">All Categories</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Sort By</label>
                <select id="sortFilter" onchange="filterGlossary()">
                    <option value="date-desc">Date (Newest)</option>
                    <option value="date-asc">Date (Oldest)</option>
                    <option value="alpha-asc">A → Z</option>
                    <option value="alpha-desc">Z → A</option>
                </select>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card"><div class="number" id="statTotal">0</div><div class="label">Total Terms</div></div>
            <div class="stat-card"><div class="number" id="statCategories">0</div><div class="label">Categories</div></div>
            <div class="stat-card"><div class="number" id="statLatest">—</div><div class="label">Last Updated</div></div>
        </div>

        <div id="glossaryContainer" class="glossary-grid"></div>

        <footer>
            <p>DevDigest • Definitions sourced from Wikipedia via GitHub Actions</p>
        </footer>
    </div>

    <script>
        let allTerms = [];

        // Robust CSV line parser that handles quoted fields
        function parseCSVLine(line) {
            const result = []; let cur = ''; let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') {
                    if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (ch === ',' && !inQuotes) {
                    result.push(cur); cur = '';
                } else {
                    cur += ch;
                }
            }
            result.push(cur);
            return result.map(s => s.trim());
        }

        function sanitize(text) {
            // Collapse any rogue tabs or newlines that slipped into the CSV
            return (text || '').replace(/[\t\n\r]+/g, ' ').replace(/ {2,}/g, ' ').trim();
        }

        async function loadGlossary() {
            try {
                const response = await fetch(`CS_Glossary.csv?t=${Date.now()}`);
                if (!response.ok) throw new Error('File not found');
                const text = await response.text();
                parseGlossaryCSV(text);
                populateCategoryFilter();
                updateStats();
                filterGlossary();
            } catch (err) {
                document.getElementById('glossaryContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>CS_Glossary.csv not found. Run the GitHub Action to generate it.</p>
                    </div>`;
            }
        }

        function parseGlossaryCSV(text) {
            // Split on real newlines — but be careful: quoted fields can contain \n
            // We rebuild lines by scanning character by character
            const lines = [];
            let cur = ''; let inQ = false;
            for (let i = 0; i < text.length; i++) {
                const ch = text[i];
                if (ch === '"') { inQ = !inQ; cur += ch; }
                else if ((ch === '\n' || ch === '\r') && !inQ) {
                    if (cur.trim()) lines.push(cur);
                    cur = '';
                    // Skip \r\n pair
                    if (ch === '\r' && text[i + 1] === '\n') i++;
                } else {
                    cur += ch;
                }
            }
            if (cur.trim()) lines.push(cur);

            if (lines.length <= 1) return;

            const headers = parseCSVLine(lines[0]);
            allTerms = [];

            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                const term = {};
                headers.forEach((h, idx) => { term[h.trim()] = values[idx] !== undefined ? values[idx] : ''; });

                // Sanitize the definition field to remove any embedded tabs/newlines
                if (term.definition) term.definition = sanitize(term.definition);
                if (term.topic) term.topic = sanitize(term.topic);

                if (term.topic) allTerms.push(term);
            }

            // Newest first by default
            allTerms.reverse();
        }

        function populateCategoryFilter() {
            const sel = document.getElementById('categoryFilter');
            const cats = [...new Set(allTerms.map(t => t.category).filter(Boolean))].sort();
            cats.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat; opt.textContent = cat;
                sel.appendChild(opt);
            });
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = allTerms.length;
            const cats = new Set(allTerms.map(t => t.category).filter(Boolean));
            document.getElementById('statCategories').textContent = cats.size;
            if (allTerms.length > 0) {
                // allTerms is reversed so index 0 is newest
                const latest = allTerms[0].date_added || '—';
                document.getElementById('statLatest').textContent = latest;
            }
        }

        function filterGlossary() {
            const search = document.getElementById('searchFilter').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;
            const sort = document.getElementById('sortFilter').value;

            let filtered = allTerms.filter(t => {
                const matchSearch = !search ||
                    (t.topic || '').toLowerCase().includes(search) ||
                    (t.definition || '').toLowerCase().includes(search);
                const matchCat = !cat || t.category === cat;
                return matchSearch && matchCat;
            });

            filtered.sort((a, b) => {
                if (sort === 'alpha-asc') return (a.topic || '').localeCompare(b.topic || '');
                if (sort === 'alpha-desc') return (b.topic || '').localeCompare(a.topic || '');
                if (sort === 'date-asc') return new Date(a.date_added) - new Date(b.date_added);
                return new Date(b.date_added) - new Date(a.date_added); // date-desc default
            });

            document.getElementById('visibleCount').textContent = filtered.length;
            renderGlossary(filtered);
        }

        function renderGlossary(terms) {
            const container = document.getElementById('glossaryContainer');
            if (terms.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <p>No terms match your search.</p>
                    </div>`;
                return;
            }

            container.innerHTML = terms.map(t => `
                <div class="glossary-card">
                    <span class="glossary-cat">${t.category || 'General'}</span>
                    <h3 class="glossary-title">${t.topic}</h3>
                    <p class="glossary-def">${t.definition || 'No definition available.'}</p>
                    <div class="glossary-footer">
                        <a href="${t.url || '#'}" target="_blank" class="glossary-link">Read on Wikipedia ↗</a>
                        <span class="glossary-date">${t.date_added || ''}</span>
                    </div>
                </div>
            `).join('');
        }

        loadGlossary();
    </script>
</body>
</html>
